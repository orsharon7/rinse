<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 460" width="820" height="460" role="img" aria-label="RINSE cycle monitor demo: rinse run invoked, two fix iterations, Copilot approves">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&amp;display=swap');
      text { font-family: 'JetBrains Mono', 'Fira Mono', 'Cascadia Code', 'Consolas', monospace; }

      /* ── Keyframe animations ───────────────────────────────────────────── */

      /* Screen 0: shell prompt */
      .s0 { animation: fade0 24s infinite; }
      @keyframes fade0 {
        0%    { opacity: 1; }
        16.5% { opacity: 1; }
        20%   { opacity: 0; }
        100%  { opacity: 0; }
      }

      /* Screen 1: cycle monitor — iter 1 (fixing) */
      .s1 { animation: fade1 24s infinite; }
      @keyframes fade1 {
        0%    { opacity: 0; }
        16.5% { opacity: 0; }
        20%   { opacity: 1; }
        37%   { opacity: 1; }
        40%   { opacity: 0; }
        100%  { opacity: 0; }
      }

      /* Screen 2: cycle monitor — iter 2 (clean) */
      .s2 { animation: fade2 24s infinite; }
      @keyframes fade2 {
        0%    { opacity: 0; }
        37%   { opacity: 0; }
        40%   { opacity: 1; }
        55%   { opacity: 1; }
        58%   { opacity: 0; }
        100%  { opacity: 0; }
      }

      /* Screen 3: approved */
      .s3 { animation: fade3 24s infinite; }
      @keyframes fade3 {
        0%    { opacity: 0; }
        55%   { opacity: 0; }
        58%   { opacity: 1; }
        75%   { opacity: 1; }
        78%   { opacity: 0; }
        100%  { opacity: 0; }
      }

      /* Screen 4: post-cycle summary */
      .s4 { animation: fade4 24s infinite; }
      @keyframes fade4 {
        0%    { opacity: 0; }
        75%   { opacity: 0; }
        78%   { opacity: 1; }
        97%   { opacity: 1; }
        100%  { opacity: 0; }
      }

      /* Spinner dots */
      .spin { animation: spin 1.2s linear infinite; }
      @keyframes spin {
        0%   { opacity: 1; }
        25%  { opacity: 0.3; }
        50%  { opacity: 0.1; }
        75%  { opacity: 0.3; }
        100% { opacity: 1; }
      }
      .spin2 { animation: spin 1.2s linear infinite 0.4s; }
      .spin3 { animation: spin 1.2s linear infinite 0.8s; }

      /* Cursor blink */
      .blink { animation: blink 1s step-end infinite; }
      @keyframes blink {
        0%, 100% { opacity: 1; }
        50%      { opacity: 0; }
      }
    </style>
  </defs>

  <!-- Terminal background -->
  <rect width="820" height="460" rx="10" fill="#181926"/>

  <!-- Title bar -->
  <rect width="820" height="36" rx="10" fill="#1E2030"/>
  <rect y="26" width="820" height="10" fill="#1E2030"/>
  <circle cx="20" cy="18" r="6" fill="#EF4444"/>
  <circle cx="40" cy="18" r="6" fill="#F59E0B"/>
  <circle cx="60" cy="18" r="6" fill="#10B981"/>
  <text x="410" y="23" text-anchor="middle" fill="#6E738D" font-size="12">rinse — ~/projects/myapp</text>

  <!-- ════════════════════════════════════════════════════════════════════ -->
  <!-- SCREEN 0: shell prompt + typing command                            -->
  <!-- ════════════════════════════════════════════════════════════════════ -->
  <g class="s0">
    <text x="24" y="72" fill="#6E738D" font-size="13">~/projects/myapp</text>
    <text x="24" y="92" fill="#8B5CF6" font-size="13" font-weight="bold">❯</text>
    <text x="40" y="92" fill="#CAD3F5" font-size="13">rinse run --pr orsharon7/rinse#42</text>
    <rect class="blink" x="388" y="78" width="8" height="16" fill="#CAD3F5"/>
    <text x="24" y="118" fill="#6E738D" font-size="12">Connecting to GitHub…</text>
    <text x="24" y="138" fill="#A5ADCB" font-size="12">PR #42 · add-oauth-flow · 3 Copilot comments pending</text>
  </g>

  <!-- ════════════════════════════════════════════════════════════════════ -->
  <!-- SCREEN 1: cycle monitor — iteration 1 (fixing)                    -->
  <!-- ════════════════════════════════════════════════════════════════════ -->
  <g class="s1">
    <!-- Header band -->
    <rect x="0" y="36" width="820" height="30" fill="#1E2030"/>
    <text x="24" y="57" fill="#8B5CF6" font-size="13" font-weight="bold">RINSE</text>
    <text x="74" y="57" fill="#6E738D" font-size="13">cycle monitor</text>
    <text x="620" y="57" fill="#6E738D" font-size="12">PR #42 · add-oauth-flow</text>

    <!-- Phase label -->
    <text x="24" y="98" fill="#A5ADCB" font-size="12">phase</text>
    <text x="80" y="98" fill="#8B5CF6" font-size="12" font-weight="bold">fixing comments</text>

    <!-- Iteration indicator -->
    <text x="24" y="124" fill="#A5ADCB" font-size="12">iter</text>
    <text x="80" y="124" fill="#CAD3F5" font-size="12">1 / 5</text>

    <!-- Spinner -->
    <text class="spin"  x="24"  y="150" fill="#8B5CF6" font-size="14">◆</text>
    <text class="spin2" x="40"  y="150" fill="#8B5CF6" font-size="14">◆</text>
    <text class="spin3" x="56"  y="150" fill="#8B5CF6" font-size="14">◆</text>
    <text x="76" y="150" fill="#CAD3F5" font-size="13">agent fixing 3 Copilot comments…</text>

    <!-- Log lines -->
    <text x="24" y="180" fill="#6E738D" font-size="12">  → reading PR diff</text>
    <text x="24" y="198" fill="#6E738D" font-size="12">  → applying fix: missing error handling in auth.go:47</text>
    <text x="24" y="216" fill="#6E738D" font-size="12">  → applying fix: extract magic constant to named const</text>
    <text x="24" y="234" fill="#6E738D" font-size="12">  → applying fix: add context parameter to db.Query call</text>
    <text x="24" y="252" fill="#6E738D" font-size="12">  → pushing commit…</text>

    <!-- History timeline -->
    <text x="24" y="294" fill="#6E738D" font-size="12">history </text>
    <text x="88" y="294" fill="#8B5CF6" font-size="14">◌</text>

    <!-- ETA -->
    <text x="24" y="320" fill="#A5ADCB" font-size="12">elapsed</text>
    <text x="96" y="320" fill="#CAD3F5" font-size="12">0:23</text>
    <text x="160" y="320" fill="#A5ADCB" font-size="12">eta</text>
    <text x="192" y="320" fill="#CAD3F5" font-size="12">~2:00</text>

    <!-- Bottom help bar -->
    <rect x="0" y="430" width="820" height="30" fill="#1E2030"/>
    <text x="24" y="450" fill="#6E738D" font-size="11">q quit  •  t timing  •  ctrl+c cancel</text>
  </g>

  <!-- ════════════════════════════════════════════════════════════════════ -->
  <!-- SCREEN 2: cycle monitor — re-requesting review                    -->
  <!-- ════════════════════════════════════════════════════════════════════ -->
  <g class="s2">
    <!-- Header band -->
    <rect x="0" y="36" width="820" height="30" fill="#1E2030"/>
    <text x="24" y="57" fill="#8B5CF6" font-size="13" font-weight="bold">RINSE</text>
    <text x="74" y="57" fill="#6E738D" font-size="13">cycle monitor</text>
    <text x="620" y="57" fill="#6E738D" font-size="12">PR #42 · add-oauth-flow</text>

    <!-- Phase label -->
    <text x="24" y="98" fill="#A5ADCB" font-size="12">phase</text>
    <text x="80" y="98" fill="#8BD5CA" font-size="12" font-weight="bold">awaiting Copilot review</text>

    <!-- Iteration indicator -->
    <text x="24" y="124" fill="#A5ADCB" font-size="12">iter</text>
    <text x="80" y="124" fill="#CAD3F5" font-size="12">2 / 5</text>

    <!-- Spinner (waiting) -->
    <text class="spin"  x="24"  y="150" fill="#8BD5CA" font-size="14">◆</text>
    <text class="spin2" x="40"  y="150" fill="#8BD5CA" font-size="14">◆</text>
    <text class="spin3" x="56"  y="150" fill="#8BD5CA" font-size="14">◆</text>
    <text x="76" y="150" fill="#CAD3F5" font-size="13">waiting for GitHub Copilot to re-review…</text>

    <!-- Log lines -->
    <text x="24" y="180" fill="#6E738D" font-size="12">  ✓ 3 comments fixed in iter 1</text>
    <text x="24" y="198" fill="#6E738D" font-size="12">  ✓ commit pushed · abc1d2e</text>
    <text x="24" y="216" fill="#6E738D" font-size="12">  ✓ review re-requested from @github-copilot</text>
    <text x="24" y="234" fill="#6E738D" font-size="12">  ⏳ polling for new review…</text>

    <!-- History timeline -->
    <text x="24" y="294" fill="#6E738D" font-size="12">history </text>
    <text x="88" y="294" fill="#10B981" font-size="14">●3</text>
    <text x="110" y="294" fill="#6E738D" font-size="12"> › </text>
    <text x="128" y="294" fill="#8BD5CA" font-size="14">◌</text>

    <!-- ETA -->
    <text x="24" y="320" fill="#A5ADCB" font-size="12">elapsed</text>
    <text x="96" y="320" fill="#CAD3F5" font-size="12">1:07</text>
    <text x="160" y="320" fill="#A5ADCB" font-size="12">eta</text>
    <text x="192" y="320" fill="#CAD3F5" font-size="12">~1:20</text>

    <!-- Bottom help bar -->
    <rect x="0" y="430" width="820" height="30" fill="#1E2030"/>
    <text x="24" y="450" fill="#6E738D" font-size="11">q quit  •  t timing  •  ctrl+c cancel</text>
  </g>

  <!-- ════════════════════════════════════════════════════════════════════ -->
  <!-- SCREEN 3: approved! post-cycle menu                               -->
  <!-- ════════════════════════════════════════════════════════════════════ -->
  <g class="s3">
    <!-- Header band -->
    <rect x="0" y="36" width="820" height="30" fill="#1E2030"/>
    <text x="24" y="57" fill="#8B5CF6" font-size="13" font-weight="bold">RINSE</text>
    <text x="74" y="57" fill="#6E738D" font-size="13">cycle monitor</text>
    <text x="620" y="57" fill="#6E738D" font-size="12">PR #42 · add-oauth-flow</text>

    <!-- Approved banner -->
    <text x="24" y="100" fill="#10B981" font-size="22" font-weight="bold">✓ Approved</text>
    <text x="24" y="126" fill="#6E738D" font-size="13">GitHub Copilot approved after 2 iterations</text>

    <!-- History timeline (full) -->
    <text x="24" y="160" fill="#6E738D" font-size="12">history </text>
    <text x="88" y="160" fill="#10B981" font-size="14">●3</text>
    <text x="110" y="160" fill="#6E738D" font-size="12"> › </text>
    <text x="128" y="160" fill="#10B981" font-size="14">✓</text>

    <!-- Post-cycle menu box -->
    <rect x="24" y="184" width="340" height="134" rx="8" fill="#1E2030" stroke="#8B5CF6" stroke-width="1"/>
    <text x="44" y="210" fill="#8B5CF6" font-size="14" font-weight="bold">PR READY TO MERGE</text>
    <text x="44" y="230" fill="#6E738D" font-size="12">What would you like to do?</text>
    <!-- Menu items -->
    <rect x="30" y="240" width="328" height="22" rx="4" fill="#363A4F"/>
    <text x="44" y="256" fill="#B7BDF8" font-size="13">→ Merge PR</text>
    <text x="44" y="278" fill="#6E738D" font-size="13">  View PR on GitHub</text>
    <text x="44" y="298" fill="#6E738D" font-size="13">  Exit</text>

    <!-- Bottom help bar -->
    <rect x="0" y="430" width="820" height="30" fill="#1E2030"/>
    <text x="24" y="450" fill="#6E738D" font-size="11">↑↓ navigate  •  enter select  •  q quit</text>
  </g>

  <!-- ════════════════════════════════════════════════════════════════════ -->
  <!-- SCREEN 4: post-cycle summary                                       -->
  <!-- ════════════════════════════════════════════════════════════════════ -->
  <g class="s4">
    <text x="24" y="75" fill="#CAD3F5" font-size="13">RINSE approved ✓ — PR #42</text>
    <text x="24" y="100" fill="#6E738D" font-size="12"> </text>
    <text x="24" y="120" fill="#A5ADCB" font-size="13">  Time saved:      <tspan fill="#CAD3F5">~4 min</tspan></text>
    <text x="24" y="144" fill="#A5ADCB" font-size="13">  Comments fixed:  <tspan fill="#CAD3F5">4 across 2 Copilot review rounds (3, 1)</tspan></text>
    <text x="24" y="168" fill="#A5ADCB" font-size="13">  Iterations:      <tspan fill="#CAD3F5">2</tspan></text>
    <text x="24" y="192" fill="#A5ADCB" font-size="13">  Top patterns:    <tspan fill="#CAD3F5">error handling, named constants, context</tspan></text>
    <text x="24" y="220" fill="#6E738D" font-size="12"> </text>
    <text x="24" y="240" fill="#6E738D" font-size="12">  Run `rinse stats` to see your history.</text>
    <text x="24" y="268" fill="#6E738D" font-size="12"> </text>
    <!-- shell prompt again -->
    <text x="24" y="292" fill="#8B5CF6" font-size="13" font-weight="bold">❯</text>
    <rect class="blink" x="40" y="278" width="8" height="16" fill="#CAD3F5"/>
  </g>
</svg>
