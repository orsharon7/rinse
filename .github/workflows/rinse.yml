name: RINSE — Copilot PR Review Loop

# Runs RINSE on new or updated same-repo PRs from trusted contributors
# (MEMBER or OWNER), excluding pushes made by github-actions[bot], driving
# Copilot review cycles until the PR is approved (no hard iteration cap;
# bounded by timeout-minutes on the job).
#
# Required secrets:
#   ANTHROPIC_API_KEY  — Claude API key (for `claude` CLI)
#
# Required repo permissions (Settings → Actions → General → Workflow permissions):
#   Read and write permissions
#
# Copilot code review must be enabled for the repository (Copilot → Code review).

on:
  pull_request:
    types: [opened, reopened, synchronize]

# Only one RINSE run per PR at a time. If a new push arrives while a run is
# in-flight, cancel the old run and start fresh on the new commit.
concurrency:
  group: rinse-pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: write        # push fix commits to the PR branch
  pull-requests: write   # request Copilot reviews, post replies

jobs:
  rinse:
    name: RINSE review loop
    runs-on: ubuntu-latest

    # Skip PRs from forks: they cannot access repository secrets.
    # Also skip runs triggered by the workflow's own fix-commit pushes to avoid
    # cancelling an in-progress loop the moment it pushes a commit.
    # Only run for trusted contributors (MEMBER or OWNER) to prevent prompt-injection
    # or secret exfiltration via PR content when Claude runs with write permissions.
    if: >
      github.event.pull_request.head.repo.full_name == github.repository &&
      github.actor != 'github-actions[bot]' &&
      (github.event.pull_request.author_association == 'MEMBER' ||
       github.event.pull_request.author_association == 'OWNER')
    timeout-minutes: 30

    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          # Full history so git push works and worktrees can be created.
          fetch-depth: 0
          # Pin checkout to the exact PR head commit from the event payload.
          ref: ${{ github.event.pull_request.head.sha }}
          # Persist credentials so git push works inside the loop.
          persist-credentials: true

      - name: Recreate PR branch at event SHA
        run: |
          set -euo pipefail
          PR_BRANCH="${{ github.event.pull_request.head.ref }}"
          PR_SHA="${{ github.event.pull_request.head.sha }}"

          git fetch --no-tags origin "refs/heads/${PR_BRANCH}:refs/remotes/origin/${PR_BRANCH}"
          git checkout --force -B "${PR_BRANCH}" "${PR_SHA}"
          git branch --set-upstream-to="origin/${PR_BRANCH}" "${PR_BRANCH}"

          test "$(git rev-parse HEAD)" = "${PR_SHA}"

      # Checkout a fixed protected branch into a separate path so that the review
      # loop script is always sourced from a trusted ref, not the PR head or a
      # PR-selected base branch. This prevents script tampering via attacker-
      # controlled target branches.
      - name: Checkout trusted scripts
        uses: actions/checkout@v4
        with:
          ref: refs/heads/${{ github.event.repository.default_branch }}
          path: _rinse-base
          fetch-depth: 1
          persist-credentials: false

      - name: Configure git identity
        run: |
          git config user.name  "rinse[bot]"
          git config user.email "rinse[bot]@users.noreply.github.com"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.17.0'

      - name: Install dependencies
        run: |
          set -euo pipefail
          # jq and shellcheck are pre-installed on ubuntu-latest runners.
          # Install a pinned Claude Code CLI version for reproducible runs.
          npm install -g @anthropic-ai/claude-code@1.0.64
          claude --version

      - name: Validate environment
        run: |
          set -euo pipefail
          : "${ANTHROPIC_API_KEY:?Secret ANTHROPIC_API_KEY is not set. Add it under Settings → Secrets → Actions.}"
          gh --version
          jq --version
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

      - name: Run RINSE
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          # GitHub Actions provides GITHUB_TOKEN; map it to GH_TOKEN for the gh CLI.
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Tell claude CLI not to prompt for permissions interactively.
          CLAUDE_DANGEROUSLY_SKIP_PERMISSIONS: "1"
        run: |
          set -euo pipefail

          PR_NUMBER="${{ github.event.pull_request.number }}"
          REPO="${{ github.repository }}"
          CWD="${GITHUB_WORKSPACE}"

          echo "▶ Starting RINSE on PR #${PR_NUMBER} in ${REPO}"
          echo "  Branch : ${{ github.event.pull_request.head.ref }}"
          echo "  Commit : ${{ github.event.pull_request.head.sha }}"

          bash _rinse-base/pr-review/pr-review-claude-v2.sh "${PR_NUMBER}" \
            --repo   "${REPO}"    \
            --cwd    "${CWD}"     \
            --model  "claude-sonnet-4-6"
