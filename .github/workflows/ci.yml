name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: tui/go.mod
          cache-dependency-path: tui/go.sum

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          working-directory: tui
          version: latest

      - name: Lint shell scripts
        run: |
          sudo apt-get install -y shellcheck
          shellcheck pr-review/*.sh install.sh

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: tui/go.mod
          cache-dependency-path: tui/go.sum

      - name: Run Go tests
        working-directory: tui
        run: go test ./...

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: tui/go.mod
          cache-dependency-path: tui/go.sum

      - name: Build binary
        working-directory: tui
        run: make build

      - name: Build cross-platform binaries
        working-directory: tui
        run: make cross

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: binaries
          path: tui/dist/
          retention-days: 7
